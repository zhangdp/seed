server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-connections: 20000
  # 禁止session
  servlet:
    session:
      tracking-modes: []
spring:
  profiles:
    active: dev
  application:
    name: @artifactId@
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 256MB
      max-request-size: 256MB
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd HH:mm:ss
  # task:
    # 启用虚拟线程后无需再配置线程池
    # execution:
    #   pool:
    #     core-size: 8
    #     max-size: 32
    #     queue-capacity: 1024
  data:
    redis:
      database: 0
      host: 127.0.0.0
      port: 6379
      password: 123456
      connect-timeout: 5s
      lettuce:
        pool:
          # 虚拟线程可大幅提升连接数
          max-active: 50
          max-idle: 20
          min-idle: 10
          # max-active: 32
          # max-idle: 12
          # min-idle: 4
          max-wait: 5s
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 30m
      key-prefix: "cache::"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/seed_db?currentSchema=public&connectTimeout=5&socketTimeout=60&tcpKeepAlive=true
    username: seed
    password: 123456
    lazy: true
    hikari:
      # 启用虚拟线程可以大幅提升连接数
      maximum-pool-size: 50
      minimum-idle: 10
      # maximum-pool-size: 20
      # minimum-idle: 4
      keepalive-time: 300000
      idle-timeout: 1800000
      max-lifetime: 7200000
      connection-timeout: 5000
      validation-timeout: 3000
management:
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
mybatis-flex:
  global-config:
    print-banner: false
    key-config:
      key-type: auto
    logic-delete-column: deleted
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1
logging:
  level:
    root: info
    web: debug
    io.github.seed: trace
app:
  security:
    access-token-ttl: 30m
    refresh-token-ttl: 24h
    auto-renew: false
    enable-refresh-token: true
    permit-urls:
      - /favicon.ico
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /actuator/**
      - /error
    actuator:
      enabled: true
      username: actuator
      password: Seed@2026
      roles: ACTUATOR
      permit-urls: health,info
  file-storage:
    root-path: ""
    type: local
    http-cacheable: true
    http-cache-max-age: 604800
    expire-duration: 0
    download-url: /file/download/{fileId}/{fileName}
    local:
      upload-dir: /Users/peng/tmp/seed/upload

# 测试环境
---
spring:
  config:
    activate:
      on-profile: test
logging:
  file:
    path: logs/${spring.application.name}
  level:
    root: info
    web: debug
    io.github.seed: debug

# 生产环境
---
spring:
  config:
    activate:
      on-profile: prod
management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
logging:
  file:
    path: logs/${spring.application.name}
  level:
    root: info
    web: info
    io.github.seed: info
